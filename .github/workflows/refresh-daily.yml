# Daily refresh: OpenAQ + Open-Meteo deltas -> data/history + data/recent -> commit.
# (Frontend build + Pages deploy are wired in Phase 10, once web/ exists.)
name: refresh-daily

on:
  schedule:
    - cron: "40 1 * * *" # 01:40 UTC daily
  workflow_dispatch:
    inputs:
      mode:
        description: "backfill (full history seed) or daily (delta)"
        type: choice
        options: [daily, backfill]
        default: daily
      cities:
        description: "optional space-separated city subset (blank = all)"
        default: ""
      sensors:
        description: "sensors per pollutant"
        type: choice
        options: [all, first]
        default: all
      from:
        description: "backfill start date YYYY-MM-DD (blank = 2016)"
        default: ""
      max_per_city:
        description: "cap stations per city (blank = all)"
        default: ""

concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A full backfill across all cities/sensors/years is long-running.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipeline
        run: pip install -e ./pipeline

      - name: Refresh history + recent (+ live)
        env:
          DATA_GOV_IN_KEY: ${{ secrets.DATA_GOV_IN_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          AIRATLAS_MIN_REQUEST_INTERVAL: "0.6"   # stay under OpenAQ's rate limit
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          CITIES="${{ github.event.inputs.cities }}"
          SENSORS="${{ github.event.inputs.sensors || 'all' }}"
          FROM="${{ github.event.inputs.from }}"
          MAXPC="${{ github.event.inputs.max_per_city }}"
          ARGS="--sensors $SENSORS"
          [ -n "$CITIES" ] && ARGS="$ARGS --cities $CITIES"
          [ -n "$FROM" ] && ARGS="$ARGS --from $FROM"
          [ -n "$MAXPC" ] && ARGS="$ARGS --max-per-city $MAXPC"
          echo "run.py $MODE $ARGS"
          python pipeline/run.py "$MODE" $ARGS

      - name: Commit refreshed data
        run: |
          git config user.name  "airatlas-bot"
          git config user.email "airatlas-bot@users.noreply.github.com"
          git add -f data/history data/recent data/live data/meta
          if ! git diff --staged --quiet; then
            git commit -m "data: ${{ github.event.inputs.mode || 'daily' }} refresh"
            # Rebase onto any commits landed while we ran, then push (retry once).
            git pull --rebase --autostash origin main || true
            git push || (git pull --rebase --autostash origin main && git push)
          fi
          # The refresh completing triggers deploy.yml (workflow_run), which rebuilds + publishes.

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow **${context.workflow}** failed.\n\nRun: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas pipeline: ${context.workflow}`, body, labels: [label] });
            }
