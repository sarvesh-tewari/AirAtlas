# Daily refresh: OpenAQ + Open-Meteo archive deltas -> data/history + data/recent
# -> rebuild frontend -> deploy. SKELETON ONLY — wired up in Phases 6 & 10.
name: refresh-daily

on:
  schedule:
    - cron: "40 1 * * *" # 01:40 UTC daily
  workflow_dispatch: {}

concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-and-deploy:
