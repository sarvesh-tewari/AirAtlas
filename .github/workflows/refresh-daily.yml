# Daily refresh: OpenAQ + Open-Meteo deltas -> data/history + data/recent -> commit.
# (Frontend build + Pages deploy are wired in Phase 10, once web/ exists.)
name: refresh-daily

on:
  schedule:
    # Two fires/day (idempotent upsert) so a skipped cron — GitHub's scheduler is best-effort —
    # doesn't let the data go stale. Either fire refreshes yesterday's delta for published cities.
    - cron: "40 1 * * *"  # 01:40 UTC
    - cron: "40 13 * * *" # 13:40 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "backfill (full history seed) or daily (delta)"
        type: choice
        options: [daily, backfill]
        default: daily
      cities:
        description: "optional space-separated city subset (blank = all)"
        default: ""
      sensors:
        description: "sensors per pollutant"
        type: choice
        options: [all, first]
        default: all
      from:
        description: "backfill start date YYYY-MM-DD (blank = 2016)"
        default: ""
      max_per_city:
        description: "cap stations per city (blank = all)"
        default: ""

concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A full backfill across all cities/sensors/years is long-running.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pipeline
        run: pip install -e ./pipeline

      # Data lives on the orphan `data` branch (not main). The pipeline UPSERTS into existing
      # parquet and backfill RESUMABILITY depends on prior data being present, so repopulate the
      # working tree from the branch BEFORE running. Guarded for the no-branch case.
      - name: Hydrate prior data from data branch
        run: |
          if git fetch --depth 1 origin '+refs/heads/data:refs/remotes/origin/data' 2>/dev/null; then
            rm -rf data
            git archive origin/data data | tar -x
            echo "Hydrated $(find data -type f | wc -l) files from data branch."
          else
            echo "No data branch yet; starting fresh."
          fi

      - name: Refresh history + recent (+ live)
        env:
          DATA_GOV_IN_KEY: ${{ secrets.DATA_GOV_IN_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          AIRATLAS_MIN_REQUEST_INTERVAL: "0.6"   # stay under OpenAQ's rate limit
          # Daily deltas fetch only ~1 day of weather (light), so they don't need the heavy
          # full-history pacing the backfill uses (15s) — 3s keeps 287 cities well under an hour.
          AIRATLAS_WEATHER_REQUEST_INTERVAL: "3"
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          CITIES="${{ github.event.inputs.cities }}"
          SENSORS="${{ github.event.inputs.sensors || 'all' }}"
          FROM="${{ github.event.inputs.from }}"
          MAXPC="${{ github.event.inputs.max_per_city }}"
          ARGS="--sensors $SENSORS"
          [ -n "$CITIES" ] && ARGS="$ARGS --cities $CITIES"
          [ -n "$FROM" ] && ARGS="$ARGS --from $FROM"
          [ -n "$MAXPC" ] && ARGS="$ARGS --max-per-city $MAXPC"
          echo "run.py $MODE $ARGS"
          python pipeline/run.py "$MODE" $ARGS

      # Publish the whole data/ tree as a single PARENTLESS commit on the `data` branch
      # (rolling snapshot; force-push keeps the branch at one commit). Built in a throwaway index.
      # Skip if unchanged to avoid a no-op redeploy. The push to the data branch is what the
      # refresh completing triggers deploy.yml (workflow_run), which rebuilds + publishes.
      - name: Publish data to data branch
        run: |
          git config user.name  "airatlas-bot"
          git config user.email "airatlas-bot@users.noreply.github.com"
          NEW_TREE=$(
            export GIT_INDEX_FILE="$(mktemp -u)"
            git add -f data
            git write-tree
          )
          PREV_TREE=$(git rev-parse --verify --quiet 'refs/remotes/origin/data^{tree}' || echo none)
          if [ "$NEW_TREE" = "$PREV_TREE" ]; then
            echo "No data change; skipping publish + redeploy."
            exit 0
          fi
          NEW_COMMIT=$(git commit-tree "$NEW_TREE" -m "data: ${{ github.event.inputs.mode || 'daily' }} refresh")
          git push --force origin "${NEW_COMMIT}:refs/heads/data"
          echo "Published data tree $NEW_TREE to data branch."

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow **${context.workflow}** failed.\n\nRun: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas pipeline: ${context.workflow}`, body, labels: [label] });
            }
