# Hourly refresh: CPCB live + Open-Meteo current -> data/live -> commit.
name: refresh-hourly

on:
  schedule:
    - cron: "17 * * * *" # hourly, offset off the top of the hour
  workflow_dispatch: {}

# Serialize with the daily job so the two never race to push.
concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipeline
        run: pip install -e ./pipeline

      - name: Refresh live snapshot
        env:
          DATA_GOV_IN_KEY: ${{ secrets.DATA_GOV_IN_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          AIRATLAS_MIN_REQUEST_INTERVAL: "0.4"
        run: python pipeline/run.py hourly

      - name: Commit refreshed data
        run: |
          git config user.name  "airatlas-bot"
          git config user.email "airatlas-bot@users.noreply.github.com"
          git add -f data/live data/meta   # data/* is dev-gitignored; CI is the source of truth
          git diff --staged --quiet || git commit -m "data: hourly refresh [skip ci]"
          git push

      # Keep-last-good means a CPCB/Open-Meteo outage leaves OLD snapshots and the run still
      # exits 0 — so check freshness explicitly and fail (-> alert) if today's data is stale.
      - name: Staleness check
        run: python pipeline/checks.py --live-dir data/live --max-hours 6

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow **${context.workflow}** failed or data went stale.\n\nRun: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas pipeline: ${context.workflow}`, body, labels: [label] });
            }
