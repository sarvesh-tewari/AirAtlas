# Hourly refresh: CPCB live + Open-Meteo current -> data/live/ -> commit.
# SKELETON ONLY — pipeline steps are wired up in Phase 6.
name: refresh-hourly

on:
  schedule:
    - cron: "17 * * * *" # hourly, offset to avoid the top-of-hour rush
  workflow_dispatch: {}

# Avoid overlapping runs piling up commits.
concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write # commit refreshed data back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
