# Hourly refresh: CPCB live + Open-Meteo current -> data/live -> commit.
name: refresh-hourly

on:
  schedule:
    - cron: "17 */4 * * *" # every ~4h, offset off the top of the hour (rolling-24h headline)
  workflow_dispatch: {}

# Serialize with the daily job so the two never race to push.
concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read   # failure-issue step reads job/step status to report what failed

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pipeline
        run: pip install -e ./pipeline

      # Data lives on the orphan `data` branch (not main). The pipeline UPSERTS into existing
      # parquet, so we must repopulate the working tree from the branch BEFORE running, or the
      # publish below would drop history/recent. Guarded for the (now unlikely) no-branch case.
      - name: Hydrate prior data from data branch
        run: |
          if git fetch --depth 1 origin '+refs/heads/data:refs/remotes/origin/data' 2>/dev/null; then
            rm -rf data
            git archive origin/data data | tar -x
            echo "Hydrated $(find data -type f | wc -l) files from data branch."
          else
            echo "No data branch yet; starting fresh."
          fi

      - name: Refresh live snapshot
        env:
          DATA_GOV_IN_KEY: ${{ secrets.DATA_GOV_IN_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          AIRATLAS_MIN_REQUEST_INTERVAL: "1.1"   # OpenAQ allows 60 req/min; 1.1s spacing stays under it
        run: |
          set -o pipefail
          python pipeline/run.py hourly 2>&1 | tee /tmp/airatlas-run.log

      # Keep-last-good means an OpenAQ/Open-Meteo outage leaves OLD snapshots and the run still
      # exits 0, so check freshness BEFORE committing and alert. The live headline is now a
      # rolling-24h average from OpenAQ hourly, whose India feed lags the wall clock by ~15-24h
      # (not the ~3h once assumed). 36h flags a genuine multi-day stall (pipeline down or OpenAQ
      # silent) without false-alarming on that normal lag.
      - name: Staleness check
        run: |
          set -o pipefail
          python pipeline/checks.py --live-dir data/live --max-hours 36 2>&1 | tee -a /tmp/airatlas-run.log

      # Publish the whole data/ tree as a single PARENTLESS commit on the `data` branch
      # (rolling snapshot — force-push keeps the branch at one commit, so main history and
      # the data branch both stay lean). Built in a throwaway index so the real index/worktree
      # are untouched. Skip if nothing changed to avoid a no-op redeploy.
      - name: Publish data to data branch
        run: |
          git config user.name  "airatlas-bot"
          git config user.email "airatlas-bot@users.noreply.github.com"
          NEW_TREE=$(
            export GIT_INDEX_FILE="$(mktemp -u)"
            git add -f data
            git write-tree
          )
          PREV_TREE=$(git rev-parse --verify --quiet 'refs/remotes/origin/data^{tree}' || echo none)
          if [ "$NEW_TREE" = "$PREV_TREE" ]; then
            echo "No data change; skipping publish + redeploy."
            exit 0
          fi
          NEW_COMMIT=$(git commit-tree "$NEW_TREE" -m "data: hourly refresh")
          git push --force origin "${NEW_COMMIT}:refs/heads/data"
          echo "Published data tree $NEW_TREE to data branch."

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Find the step that actually failed, for an at-a-glance cause in the alert.
            let failedStep = "unknown step";
            try {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo, run_id: context.runId });
              for (const job of jobs.data.jobs) {
                const s = (job.steps || []).find(s => s.conclusion === "failure");
                if (s) { failedStep = `${job.name} → ${s.name}`; break; }
              }
            } catch (e) { /* fall back to "unknown step" */ }

            // Tail of the captured run log, so the error (or staleness reason) is in the issue.
            let logTail = "(no run log captured)";
            try {
              const lines = fs.readFileSync("/tmp/airatlas-run.log", "utf8").trim().split("\n");
              logTail = lines.slice(-40).join("\n");
            } catch (e) { /* step may have failed before writing the log */ }

            const body = [
              `Workflow **${context.workflow}** failed or data went stale.`,
              ``,
              `**Failed step:** ${failedStep}`,
              `**Run:** ${runUrl}`,
              ``,
              `<details><summary>Last 40 log lines</summary>`,
              ``,
              "```",
              logTail,
              "```",
              `</details>`,
            ].join("\n");

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas pipeline: ${context.workflow}`, body, labels: [label] });
            }
