# Incremental backfill "drip": fully backfill the next batch of not-yet-published cities
# (all sensors, 2016+), publish them, then re-dispatch itself (self-chaining via DRIP_PAT) until
# every discovered city is published, then self-disables. Guarantees complete-or-absent: a city
# only appears once it has full history. A 2-hourly cron stays as a best-effort backup trigger.
name: backfill-drip

on:
  schedule:
    - cron: "33 */2 * * *" # every 2 hours, offset away from the hourly (:17) and daily (01:40) jobs
  workflow_dispatch:
    inputs:
      batch_size:
        description: "cities to backfill this run"
        default: "15"

# Share the data-refresh lock so the drip never races the hourly/daily publishers on the data
# branch force-push (they serialize; whichever holds the lock finishes first).
concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write # to disable this workflow once the backfill is complete

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pipeline
        run: pip install -e ./pipeline

      # The planner reads which cities are already published from data/meta/city_list.json, so the
      # working tree must hold the current data branch before we run.
      - name: Hydrate prior data from data branch
        run: |
          if git fetch --depth 1 origin '+refs/heads/data:refs/remotes/origin/data' 2>/dev/null; then
            rm -rf data
            git archive origin/data data | tar -x
            echo "Hydrated $(find data -type f | wc -l) files from data branch."
          else
            echo "No data branch yet; starting fresh."
          fi

      - name: Backfill next batch
        id: backfill
        env:
          DATA_GOV_IN_KEY: ${{ secrets.DATA_GOV_IN_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          AIRATLAS_MIN_REQUEST_INTERVAL: "0.6"
        run: |
          BATCH="${{ github.event.inputs.batch_size || '8' }}"
          python pipeline/run.py backfill --next-batch "$BATCH" --sensors all | tee /tmp/drip.log
          if grep -q "no unpublished cities remain" /tmp/drip.log; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          fi

      # Same publish path as the refresh workflows: single parentless commit, force-pushed, skipped
      # if the tree is unchanged (e.g. when the backfill is already complete).
      - name: Publish data to data branch
        run: |
          git config user.name  "airatlas-bot"
          git config user.email "airatlas-bot@users.noreply.github.com"
          NEW_TREE=$(
            export GIT_INDEX_FILE="$(mktemp -u)"
            git add -f data
            git write-tree
          )
          PREV_TREE=$(git rev-parse --verify --quiet 'refs/remotes/origin/data^{tree}' || echo none)
          if [ "$NEW_TREE" = "$PREV_TREE" ]; then
            echo "No data change; skipping publish + redeploy."
            exit 0
          fi
          NEW_COMMIT=$(git commit-tree "$NEW_TREE" -m "data: backfill drip")
          git push --force origin "${NEW_COMMIT}:refs/heads/data"
          echo "Published data tree $NEW_TREE to data branch."

      # Self-chain: re-dispatch the next batch. Uses DRIP_PAT because the built-in GITHUB_TOKEN
      # can't trigger workflow_dispatch (anti-recursion). Guarded by success() so a failed batch
      # halts the chain (the failure issue alerts) instead of looping; the concurrency lock makes
      # the chained run wait for this one. Reliable + unattended, unlike GitHub's best-effort cron.
      - name: Chain next batch
        if: success() && steps.backfill.outputs.done != 'true'
        env:
          GH_TOKEN: ${{ secrets.DRIP_PAT }}
        run: |
          BATCH="${{ github.event.inputs.batch_size || '15' }}"
          gh workflow run backfill-drip.yml -f batch_size="$BATCH"
          echo "Chained next batch (size $BATCH)."

      - name: Disable drip when backfill is complete
        if: steps.backfill.outputs.done == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "All discovered cities published; disabling the drip schedule."
          gh workflow disable backfill-drip.yml

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Workflow **${context.workflow}** failed.\n\nRun: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas pipeline: ${context.workflow}`, body, labels: [label] });
            }
