# Build the frontend and publish to GitHub Pages.
# Runs on every push to main (code or committed data) and on demand.
# NOTE: GitHub Pages must be enabled (Settings → Pages → Source: GitHub Actions) and the repo
# must be public on a free plan. Until then this workflow's deploy step will fail (harmless).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Data commits are made by the refresh workflows' token, which doesn't re-trigger `push`
  # (GitHub anti-recursion). So redeploy after a refresh completes.
  workflow_run:
    workflows: [refresh-hourly, refresh-daily, backfill-drip, remedian-drip]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write   # open an alert issue if the post-deploy smoke check fails
  actions: read   # failure-issue step reads job/step status

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Don't publish after a FAILED/cancelled refresh (workflow_run fires on any completion).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Stage published data for the build
        run: |
          # data/ lives on the orphan `data` branch (not main); fetch + extract into the site's
          # public dir. Build dataless (empty states) if the branch is somehow absent.
          mkdir -p web/public
          rm -rf web/public/data
          if git fetch --depth 1 origin '+refs/heads/data:refs/remotes/origin/data' 2>/dev/null; then
            git archive origin/data data | tar -x -C web/public
            echo "Staged $(find web/public/data -type f | wc -l) data files from data branch."
            # Cache-buster for the build: the data-branch SHA changes exactly when data is
            # republished, so the frontend can version its data URLs and never serve stale files.
            echo "DATA_VERSION=$(git rev-parse --short origin/data)" >> "$GITHUB_ENV"
          else
            echo "No data branch found; building without data."
            mkdir -p web/public/data
            echo "DATA_VERSION=nodata" >> "$GITHUB_ENV"
          fi

      - name: Build
        working-directory: web
        env:
          VITE_BASE: /AirAtlas/ # project-pages base path; change if using a custom domain
          VITE_DATA_VERSION: ${{ env.DATA_VERSION }} # cache-buster appended to data-file URLs
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
      - id: deploy
        uses: actions/deploy-pages@v5

      # Post-deploy smoke check: confirm the live site actually serves the app + real data
      # (catches a broken deploy / missing data that a build-time test can't). Retries ride out
      # CDN propagation. Node 20+ has global fetch.
      - name: Smoke-test the deployed site
        run: |
          set -o pipefail
          node scripts/smoke.mjs "${{ steps.deploy.outputs.page_url }}" 2>&1 | tee /tmp/smoke.log

      - name: Open/append failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const label = "pipeline-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let failedStep = "unknown step";
            try {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo, run_id: context.runId });
              for (const job of jobs.data.jobs) {
                const s = (job.steps || []).find((s) => s.conclusion === "failure");
                if (s) { failedStep = `${job.name} → ${s.name}`; break; }
              }
            } catch (e) { /* fall back */ }
            let logTail = "(no smoke log captured — failure was before the smoke step)";
            try {
              logTail = fs.readFileSync("/tmp/smoke.log", "utf8").trim().split("\n").slice(-30).join("\n");
            } catch (e) { /* build/deploy failed before smoke ran */ }
            const body = [
              `Workflow **${context.workflow}** failed (build, deploy, or post-deploy smoke check).`,
              ``, `**Failed step:** ${failedStep}`, `**Run:** ${runUrl}`, ``,
              `<details><summary>Smoke log</summary>`, ``, "```", logTail, "```", `</details>`,
            ].join("\n");
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: label });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 AirAtlas: ${context.workflow}`, body, labels: [label] });
            }
