# Build the frontend and publish to GitHub Pages.
# Runs on every push to main (code or committed data) and on demand.
# NOTE: GitHub Pages must be enabled (Settings → Pages → Source: GitHub Actions) and the repo
# must be public on a free plan. Until then this workflow's deploy step will fail (harmless).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Data commits are made by the refresh workflows' token, which doesn't re-trigger `push`
  # (GitHub anti-recursion). So redeploy after a refresh completes.
  workflow_run:
    workflows: [refresh-hourly, refresh-daily, backfill-drip, remedian-drip]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Don't publish after a FAILED/cancelled refresh (workflow_run fires on any completion).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Stage published data for the build
        run: |
          # data/ lives on the orphan `data` branch (not main); fetch + extract into the site's
          # public dir. Build dataless (empty states) if the branch is somehow absent.
          mkdir -p web/public
          rm -rf web/public/data
          if git fetch --depth 1 origin '+refs/heads/data:refs/remotes/origin/data' 2>/dev/null; then
            git archive origin/data data | tar -x -C web/public
            echo "Staged $(find web/public/data -type f | wc -l) data files from data branch."
            # Cache-buster for the build: the data-branch SHA changes exactly when data is
            # republished, so the frontend can version its data URLs and never serve stale files.
            echo "DATA_VERSION=$(git rev-parse --short origin/data)" >> "$GITHUB_ENV"
          else
            echo "No data branch found; building without data."
            mkdir -p web/public/data
            echo "DATA_VERSION=nodata" >> "$GITHUB_ENV"
          fi

      - name: Build
        working-directory: web
        env:
          VITE_BASE: /AirAtlas/ # project-pages base path; change if using a custom domain
          VITE_DATA_VERSION: ${{ env.DATA_VERSION }} # cache-buster appended to data-file URLs
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
      - id: deploy
        uses: actions/deploy-pages@v5
