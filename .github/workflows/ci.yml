# Regression gate: runs automatically on every push to main and every PR (no approval gate).
# Lints + runs the full pytest suite and type-checks/builds the frontend, blocking broken code.
# Post-deploy smoke (deploy.yml) and the scheduled uptime check (uptime.yml) are separate.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pipeline (with dev deps)
        run: pip install -e "./pipeline[dev]"
      - name: Lint
        run: ruff check pipeline
      - name: Tests
        working-directory: pipeline
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Check formatting, typecheck + bundle
        working-directory: web
        run: |
          npm ci
          npm run format:check
          npm run build
