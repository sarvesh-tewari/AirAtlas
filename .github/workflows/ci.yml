name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pipeline (with dev deps)
        run: pip install -e "./pipeline[dev]"
      - name: Lint
        run: ruff check pipeline
      - name: Tests
        working-directory: pipeline
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend (typecheck + bundle)
        working-directory: web
        run: |
          npm ci
          npm run build
